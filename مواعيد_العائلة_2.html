<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>مواعيد العائلة</title>

<!-- iOS PWA Meta -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="مواعيد العائلة">
<meta name="theme-color" content="#3d5d54">
<meta name="format-detection" content="telephone=no">

<!-- أيقونة التطبيق على شاشة الأيفون -->
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxODAgMTgwIj48cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgcng9IjQwIiBmaWxsPSIjM2Q1ZDU0Ii8+PHRleHQgeD0iOTAiIHk9IjEyMCIgZm9udC1mYW1pbHk9Ikdlb3JnaWEiIGZvbnQtc2l6ZT0iMTAwIiBmb250LXdlaWdodD0iNzAwIiBmaWxsPSIjZmJmOGYxIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj7Yp9mEPC90ZXh0Pjwvc3ZnPg==">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;500;600;700&family=Amiri:wght@700&display=swap" rel="stylesheet">

<style>
  :root{
    --ios-bg: #f2f1ec;
    --ios-bg-grouped: #fbfaf6;
    --card: #ffffff;
    --ink: #1a2e2a;
    --ink-soft: #4a5d58;
    --muted: #8a9590;
    --hairline: rgba(60,60,67,0.12);
    --hairline-strong: rgba(60,60,67,0.2);

    --sage: #5b8276;
    --sage-deep: #3d5d54;
    --sage-tint: rgba(91,130,118,0.12);
    --terra: #c4623d;
    --terra-tint: rgba(196,98,61,0.12);
    --gold: #b8924a;
    --plum: #6b4565;
    --sky: #6b8aa8;
    --rose: #b8556e;

    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  *{
    box-sizing:border-box;
    margin:0;padding:0;
    -webkit-tap-highlight-color: transparent;
  }

  html,body{
    overflow-x: hidden;
  }

  body{
    font-family: 'Readex Pro', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--ios-bg);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding-top: var(--safe-top);
    padding-bottom: calc(var(--safe-bottom) + 24px);
    overscroll-behavior-y: contain;
  }

  /* ===== شريط علوي ===== */
  .topbar{
    position: sticky;
    top: 0;
    background: rgba(242,241,236,0.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    z-index: 50;
    padding: 12px 20px;
    border-bottom: 0.5px solid var(--hairline);
    padding-top: calc(12px + var(--safe-top));
  }
  .topbar-row{
    display:flex;align-items:center;justify-content:space-between;
  }
  .greeting{
    font-size: 14px;
    color: var(--muted);
    font-weight:500;
  }
  .greeting strong{
    color: var(--ink);
    font-weight:600;
  }
  .topbar-actions{
    display:flex;gap:8px;
  }
  .icon-btn{
    width:36px;height:36px;
    border-radius:50%;
    background: var(--card);
    border:none;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    color: var(--sage-deep);
    transition: transform 0.15s, background 0.2s;
  }
  .icon-btn:active{transform: scale(0.92); background: var(--sage-tint)}
  .icon-btn svg{width:18px;height:18px;stroke-width:2}

  /* ===== المحتوى ===== */
  .scroll-area{
    padding: 0 16px;
  }

  .page-title{
    font-family: 'Amiri', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--ink);
    margin: 16px 4px 4px;
    letter-spacing:-0.02em;
  }
  .page-sub{
    font-size: 14px;
    color: var(--muted);
    margin: 0 4px 20px;
  }

  /* ===== بطاقة الموعد القادم (Hero) ===== */
  .hero{
    background: linear-gradient(135deg, var(--sage-deep) 0%, var(--sage) 100%);
    border-radius: 22px;
    padding: 22px;
    color: white;
    position: relative;
    overflow: hidden;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px -10px rgba(61,93,84,0.4);
  }
  .hero::before{
    content:"";
    position:absolute;
    top:-30px;left:-30px;
    width:180px;height:180px;
    border-radius:50%;
    background:rgba(255,255,255,0.06);
  }
  .hero::after{
    content:"";
    position:absolute;
    bottom:-50px;right:-30px;
    width:140px;height:140px;
    border-radius:50%;
    background:rgba(255,255,255,0.04);
  }
  .hero-content{position:relative;z-index:2}
  .hero-badge{
    display:inline-flex;align-items:center;gap:6px;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(10px);
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight:600;
    letter-spacing:0.05em;
    text-transform:uppercase;
    margin-bottom: 14px;
  }
  .hero-badge::before{
    content:"";width:6px;height:6px;border-radius:50%;background:#fff;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:0.6;transform:scale(1.3)}
  }
  .hero-patient{
    font-size: 15px;
    opacity: 0.9;
    margin-bottom:4px;
    font-weight:500;
  }
  .hero-title{
    font-family: 'Amiri', serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 12px;
  }
  .hero-meta{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom:16px;
  }
  .hero-meta-item{
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 10px 12px;
  }
  .hero-meta-label{
    font-size:11px;opacity:0.75;
    text-transform:uppercase;letter-spacing:0.06em;
    margin-bottom:2px;
  }
  .hero-meta-value{
    font-size:15px;font-weight:600;
    font-feature-settings:'tnum';
  }
  .hero-countdown{
    display:flex;align-items:center;gap:10px;
    padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.15);
  }
  .hero-cd-num{
    font-family:'Amiri',serif;
    font-size: 36px;
    font-weight:700;
    line-height:1;
  }
  .hero-cd-text{
    font-size:13px;
    opacity:0.85;
    line-height:1.3;
  }

  /* ===== أزرار الإجراءات السريعة ===== */
  .quick-actions{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 24px;
  }
  .quick-btn{
    background: var(--card);
    border: none;
    border-radius: 14px;
    padding: 12px 8px;
    display:flex;flex-direction:column;align-items:center;gap:6px;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
    text-decoration: none;
    color: inherit;
    font-family: inherit;
  }
  .quick-btn:active{transform: scale(0.96); background: #f0eee8}
  .quick-btn-icon{
    width:36px;height:36px;
    border-radius: 10px;
    display:flex;align-items:center;justify-content:center;
  }
  .quick-btn-icon svg{width:18px;height:18px;stroke-width:2}
  .qa-call .quick-btn-icon{background: var(--sage-tint); color: var(--sage-deep)}
  .qa-cal .quick-btn-icon{background: var(--terra-tint); color: var(--terra)}
  .qa-share .quick-btn-icon{background: rgba(107,138,168,0.15); color: var(--sky)}
  .quick-btn-label{
    font-size:12px;
    font-weight:500;
    color: var(--ink-soft);
  }

  /* ===== فلاتر الأطفال ===== */
  .filter-tabs{
    display:flex;gap:8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin-bottom: 20px;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .filter-tabs::-webkit-scrollbar{display:none}
  .filter-chip{
    flex-shrink: 0;
    background: var(--card);
    border: 0.5px solid var(--hairline);
    border-radius: 999px;
    padding: 8px 16px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-soft);
    cursor: pointer;
    display:flex;align-items:center;gap:8px;
    transition: all 0.2s;
  }
  .filter-chip.active{
    background: var(--ink);
    color: var(--ios-bg-grouped);
    border-color: var(--ink);
  }
  .filter-chip-dot{
    width:8px;height:8px;border-radius:50%;
  }
  .chip-all .filter-chip-dot{background: linear-gradient(45deg, var(--terra), var(--sage), var(--plum))}
  .chip-g .filter-chip-dot{background: var(--terra)}
  .chip-n .filter-chip-dot{background: var(--plum)}
  .chip-i .filter-chip-dot{background: var(--sky)}
  .filter-chip-count{
    background: var(--hairline);
    color: var(--ink-soft);
    padding: 1px 7px;
    border-radius: 999px;
    font-size: 11px;
    font-weight:600;
    font-feature-settings:'tnum';
  }
  .filter-chip.active .filter-chip-count{
    background: rgba(255,255,255,0.2);
    color: white;
  }

  /* ===== مجموعات المواعيد ===== */
  .group-header{
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 24px 4px 10px;
    display:flex;align-items:center;gap:8px;
  }
  .group-header::after{
    content:"";flex:1;height:0.5px;background:var(--hairline);
  }

  .appt-list{
    background: var(--card);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }

  .appt{
    display: block;
    padding: 14px 16px;
    border-bottom: 0.5px solid var(--hairline);
    cursor: pointer;
    position: relative;
    transition: background 0.15s;
    text-decoration: none;
    color: inherit;
  }
  .appt:last-child{border-bottom:none}
  .appt:active{background: #f5f3ed}

  .appt-row{
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .appt-date-block{
    flex-shrink: 0;
    width: 52px;
    text-align: center;
    border-left: 0.5px solid var(--hairline-strong);
    padding-left: 12px;
  }
  .appt-day-num{
    font-family:'Amiri',serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1;
    color: var(--ink);
    letter-spacing:-0.02em;
  }
  .appt-day-name{
    font-size: 11px;
    color: var(--muted);
    margin-top:2px;
    font-weight:500;
  }
  .appt-month{
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 1px;
  }

  .appt-body{
    flex: 1;
    min-width: 0;
  }
  .appt-tag-row{
    display:flex;align-items:center;gap:8px;
    margin-bottom:4px;
  }
  .patient-pill{
    display:inline-flex;align-items:center;gap:5px;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 999px;
    color: white;
  }
  .pill-g{background: var(--terra)}
  .pill-n{background: var(--plum)}
  .pill-i{background: var(--sky)}
  .new-pill{
    background: var(--gold);
    color: white;
    font-size:10px;
    font-weight:700;
    padding: 2px 7px;
    border-radius: 999px;
  }
  .appt-title{
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .appt-sub{
    font-size: 12px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .appt-time-block{
    flex-shrink: 0;
    text-align: center;
    min-width: 56px;
  }
  .appt-time{
    font-family:'Amiri',serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    font-feature-settings:'tnum';
    letter-spacing:-0.01em;
  }
  .appt-period{
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .appt-chevron{
    color: var(--muted);
    flex-shrink:0;
    margin-right:-4px;
  }

  /* ===== Modal ===== */
  .modal-overlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn 0.25s;
  }
  .modal-overlay.show{display:flex}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{
    background: var(--ios-bg-grouped);
    width: 100%;
    max-width: 500px;
    border-radius: 24px 24px 0 0;
    padding: 12px 20px calc(20px + var(--safe-bottom));
    animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 90vh;
    overflow-y: auto;
  }
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-handle{
    width: 36px;
    height: 5px;
    background: var(--hairline-strong);
    border-radius: 999px;
    margin: 0 auto 16px;
  }
  .modal-header{
    display:flex;justify-content:space-between;align-items:flex-start;
    margin-bottom: 18px;
    gap:12px;
  }
  .modal-patient-pill{
    align-self: flex-start;
    margin-bottom:8px;
  }
  .modal-title{
    font-family:'Amiri',serif;
    font-size: 24px;
    font-weight:700;
    line-height:1.2;
    color: var(--ink);
  }
  .modal-close{
    width: 32px;height:32px;
    border-radius:50%;
    background: var(--hairline);
    border:none;
    color: var(--ink-soft);
    font-size: 16px;font-weight:600;
    cursor:pointer;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }

  .detail-list{
    background: var(--card);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .detail-item{
    display:flex;justify-content:space-between;align-items:center;
    padding: 14px 16px;
    border-bottom: 0.5px solid var(--hairline);
    gap:12px;
  }
  .detail-item:last-child{border-bottom:none}
  .detail-label{
    font-size: 14px;
    color: var(--muted);
    flex-shrink:0;
  }
  .detail-value{
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    text-align:left;
  }

  .modal-actions{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .modal-btn{
    background: var(--card);
    border: none;
    border-radius: 14px;
    padding: 14px;
    display:flex;align-items:center;justify-content:center;gap:8px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    color: var(--sage-deep);
    cursor: pointer;
    text-decoration:none;
    transition: transform 0.15s;
  }
  .modal-btn:active{transform:scale(0.97)}
  .modal-btn.primary{
    background: var(--sage-deep);
    color: white;
  }
  .modal-btn.full{grid-column: 1 / -1}
  .modal-btn svg{width:16px;height:16px;stroke-width:2}

  .prep-section{
    background: var(--card);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .prep-title{
    font-size:12px;font-weight:600;
    color: var(--sage-deep);
    text-transform:uppercase;letter-spacing:0.06em;
    margin-bottom:10px;
  }
  .prep-list{
    list-style:none;
  }
  .prep-list li{
    font-size: 14px;
    color: var(--ink-soft);
    padding: 4px 0;
    display:flex;gap:8px;
  }
  .prep-list li::before{
    content:"✓";
    color: var(--sage);
    font-weight:700;
  }

  .urgent-banner{
    background: linear-gradient(135deg, #fff5f0, #ffe8dc);
    border: 1px solid var(--terra);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 14px;
    display:flex;align-items:center;gap:10px;
    color: #8b3e1e;
    font-size: 13px;
    font-weight:500;
  }
  .urgent-banner-icon{
    font-size:20px;
  }

  /* ===== Toast ===== */
  .toast{
    position: fixed;
    bottom: calc(20px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--ink);
    color: white;
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 13px;
    font-weight:500;
    z-index: 200;
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    pointer-events: none;
  }
  .toast.show{transform: translateX(-50%) translateY(0)}

  /* ===== بطاقة المستشفى ===== */
  .hospital-card{
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    margin-top: 24px;
    display:flex;align-items:center;gap:14px;
  }
  .hospital-icon{
    width: 44px;height:44px;
    background: var(--sage-tint);
    border-radius: 12px;
    display:flex;align-items:center;justify-content:center;
    color: var(--sage-deep);
    flex-shrink:0;
  }
  .hospital-icon svg{width:22px;height:22px;stroke-width:2}
  .hospital-info{flex:1;min-width:0}
  .hospital-name{
    font-size:14px;font-weight:600;
    color: var(--ink);
    margin-bottom:2px;
  }
  .hospital-loc{
    font-size:12px;color:var(--muted);
  }
  .hospital-call{
    background: var(--sage-deep);
    color: white;
    border:none;
    width: 40px;height:40px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    text-decoration: none;
    flex-shrink:0;
  }
  .hospital-call:active{transform:scale(0.92)}
  .hospital-call svg{width:18px;height:18px}

  .install-tip{
    background: linear-gradient(135deg, #fff5e6, #fff);
    border: 1px solid var(--gold);
    border-radius: 14px;
    padding: 14px;
    margin-top: 16px;
    font-size: 13px;
    color: var(--ink-soft);
    display: none;
  }
  .install-tip.show{display:block}
  .install-tip strong{color: var(--gold); font-weight:600}

  .empty-state{
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .empty-state-icon{
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  /* أنميشن دخول العناصر */
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(8px)}
    to{opacity:1;transform:translateY(0)}
  }
  .hero, .quick-actions, .filter-tabs, .group-section{
    animation: fadeUp 0.4s ease-out backwards;
  }
  .hero{animation-delay:0.05s}
  .quick-actions{animation-delay:0.1s}
  .filter-tabs{animation-delay:0.15s}
  .group-section{animation-delay:0.2s}

  /* وضع الحفظ على الشاشة الرئيسية */
  @media (display-mode: standalone){
    body{padding-top: var(--safe-top)}
  }
</style>
</head>
<body>

<!-- شريط علوي -->
<div class="topbar">
  <div class="topbar-row">
    <div>
      <div class="greeting" id="greeting">مرحباً 👋</div>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" onclick="addAllToCalendar()" aria-label="إضافة الكل للتقويم">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>

const HOSPITAL = {

const ARABIC_DAYS = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const ARABIC_MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const PATIENT_NAMES = {g:'غيم', n:'نوح', i:'إبراهيم'};

// =========================================================
// الحالة
// =========================================================
let currentFilter = 'all';
let upcomingAppts = [];

// =========================================================
// التهيئة
// =========================================================
function init(){
  // التحية حسب الوقت
  const hr = new Date().getHours();
  let g = 'مرحباً';
  if(hr < 12) g = 'صباح الخير ☀️';
  else if(hr < 17) g = 'مساء الخير 🌤';
  else g = 'مساء الخير 🌙';
  document.getElementById('greeting').innerHTML = g;

  // فلترة المواعيد القادمة فقط
  const now = new Date();
  upcomingAppts = APPOINTMENTS
    .map(a => ({...a, dt: parseDateTime(a.date, a.time)}))
    .filter(a => {
      const end = new Date(a.dt);
      end.setHours(23,59,59,999);
      return end >= now;
    })
    .sort((a,b) => a.dt - b.dt);

  updateCounts();
  renderHero();
  renderList();
  setupFilters();
  checkInstallTip();
}

function parseDateTime(dateStr, timeStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  const [h,min] = timeStr.split(':').map(Number);
  return new Date(y, m-1, d, h, min);
}

function updateCounts(){
  document.getElementById('cntAll').textContent = upcomingAppts.length;
  document.getElementById('cntG').textContent = upcomingAppts.filter(a=>a.patient==='g').length;
  document.getElementById('cntN').textContent = upcomingAppts.filter(a=>a.patient==='n').length;
  document.getElementById('cntI').textContent = upcomingAppts.filter(a=>a.patient==='i').length;
}

// =========================================================
// بطاقة الموعد القادم
// =========================================================
function renderHero(){
  if(upcomingAppts.length === 0){
    document.getElementById('hero').style.display = 'none';
    return;
  }
  const next = upcomingAppts[0];
  document.getElementById('heroPatient').textContent = next.patientName;
  document.getElementById('heroTitle').textContent = next.title;

  const dayName = ARABIC_DAYS[next.dt.getDay()];
  const dayNum = next.dt.getDate();
  const monthName = ARABIC_MONTHS[next.dt.getMonth()];
  document.getElementById('heroDate').textContent = `${dayName} ${dayNum} ${monthName}`;

  document.getElementById('heroTime').textContent = formatTime(next.time);

  // العداد
  const now = new Date();
  const diffMs = next.dt - now;
  const diffDays = Math.floor(diffMs / (1000*60*60*24));
  const diffHrs = Math.floor(diffMs / (1000*60*60));

  let cdNum, cdText;
  if(diffHrs < 0){
    cdNum = '⚡';
    cdText = 'قريباً جداً';
  } else if(diffHrs < 1){
    cdNum = '⚡';
    cdText = 'الآن!';
  } else if(diffHrs < 24 && next.dt.getDate() === now.getDate()){
    cdNum = diffHrs;
    cdText = diffHrs === 1 ? 'ساعة فقط ⏰' : 'ساعات متبقية';
  } else if(diffDays === 0){
    cdNum = 'غداً';
    cdText = 'استعدّوا 🌅';
  } else if(diffDays === 1){
    cdNum = 'بعد';
    cdText = 'يومين';
  } else {
    cdNum = diffDays + 1;
    cdText = 'أيام متبقية';
  }
  document.getElementById('heroCdNum').textContent = cdNum;
  document.getElementById('heroCdText').textContent = cdText;
}

function openHero(){
  if(upcomingAppts.length > 0) showApptDetails(upcomingAppts[0].id);
}

// =========================================================
// قائمة المواعيد
// =========================================================
function renderList(){
  const container = document.getElementById('appointmentsContainer');
  const filtered = currentFilter === 'all'
    ? upcomingAppts
    : upcomingAppts.filter(a => a.patient === currentFilter);

  if(filtered.length === 0){
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📭</div>
        <div>لا توجد مواعيد قادمة لهذا الفلتر</div>
      </div>
    `;
    return;
  }

  // تجميع حسب الفترة الزمنية
  const groups = groupByPeriod(filtered);
  let html = '';

  for(const [groupName, appts] of Object.entries(groups)){
    if(appts.length === 0) continue;
    html += `<div class="group-section"><div class="group-header">${groupName}</div><div class="appt-list">`;
    for(const a of appts){
      html += renderApptItem(a);
    }
    html += `</div></div>`;
  }

  container.innerHTML = html;

  // ربط الأحداث
  container.querySelectorAll('.appt').forEach(el => {
    el.addEventListener('click', () => showApptDetails(el.dataset.id));
  });
}

function groupByPeriod(appts){
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  // بداية الأسبوع الحالي (الأحد)
  const weekEnd = new Date(today);
  const daysUntilSat = (6 - today.getDay() + 7) % 7;
  weekEnd.setDate(today.getDate() + daysUntilSat);
  weekEnd.setHours(23,59,59,999);

  const nextWeekEnd = new Date(weekEnd);
  nextWeekEnd.setDate(weekEnd.getDate() + 7);

  const monthEnd = new Date(today.getFullYear(), today.getMonth()+1, 0, 23, 59, 59);

  const groups = {
    'هذا الأسبوع': [],
    'الأسبوع القادم': [],
    'لاحقاً هذا الشهر': [],
    'الأشهر القادمة': []
  };

  for(const a of appts){
    if(a.dt <= weekEnd) groups['هذا الأسبوع'].push(a);
    else if(a.dt <= nextWeekEnd) groups['الأسبوع القادم'].push(a);
    else if(a.dt <= monthEnd) groups['لاحقاً هذا الشهر'].push(a);
    else groups['الأشهر القادمة'].push(a);
  }

  return groups;
}

function renderApptItem(a){
  const dayName = ARABIC_DAYS[a.dt.getDay()];
  const dayNum = a.dt.getDate();
  const monthName = ARABIC_MONTHS[a.dt.getMonth()];
  const time = formatTime(a.time);
  const [hPart, period] = time.split(' ');
  const newTag = a.isNew ? '<span class="new-pill">جديد</span>' : '';

  return `
    <div class="appt" data-id="${a.id}">
      <div class="appt-row">
        <div class="appt-date-block">
          <div class="appt-day-num">${dayNum}</div>
          <div class="appt-day-name">${dayName}</div>
          <div class="appt-month">${monthName}</div>
        </div>
        <div class="appt-body">
          <div class="appt-tag-row">
            <span class="patient-pill pill-${a.patient}">${PATIENT_NAMES[a.patient]}</span>
            ${newTag}
          </div>
          <div class="appt-title">${a.title}</div>
          <div class="appt-sub">${a.doctor}</div>
        </div>
        <div class="appt-time-block">
          <div class="appt-time">${hPart}</div>
          <div class="appt-period">${period}</div>
        </div>
        <div class="appt-chevron">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        </div>
      </div>
    </div>
  `;
}

function formatTime(timeStr){
  const [h, m] = timeStr.split(':').map(Number);
  const period = h >= 12 ? 'م' : 'ص';
  let displayH = h % 12;
  if(displayH === 0) displayH = 12;
  return `${displayH}:${m.toString().padStart(2,'0')} ${period}`;
}

// الفلاتر

function setupFilters(){
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentFilter = chip.dataset.filter;
      renderList();
    });
  });
}

        <span class="patient-pill pill-${a.patient} modal-patient-pill">${a.patientName} · ${a.fileNo}</span>
        <div class="modal-title">${a.title}</div>

    <div class="detail-list">
      <div class="detail-item">
        <span class="detail-label">التاريخ</span>
        <span class="detail-value">${fullDate}</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">الوقت</span>
        <span class="detail-value">${formatTime(a.time)}</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">الطبيب</span>
        <span class="detail-value">${a.doctor}</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">الموقع</span>
        <span class="detail-value">${a.location}</span>
      </div>
    </div>

    <div class="prep-section">
      <div class="prep-title">قبل الذهاب</div>
      <ul class="prep-list">${prepHtml}</ul>
    </div>

    <div class="modal-actions">
      <button class="modal-btn primary full" onclick="addOneToCalendar('${a.id}')">

        إضافة لتقويم الأيفون
      </button>
      <a class="modal-btn" href="${HOSPITAL.mapsUrl}" target="_blank">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        الخريطة
      </a>
      <button class="modal-btn" onclick="shareOne('${a.id}')">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m9.032 4.026a3 3 0 10-2.684 0m2.684 0L8.684 8.658m9.032 7.026l-9.032-4.342"/></svg>
        مشاركة
      </button>
    </div>
  `;

  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal(){
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow = '';
}

// =========================================================
// إضافة للتقويم (.ics)
// =========================================================
function generateICS(appts){
  const lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Mutairi Family//Appointments//AR',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH'
  ];

  for(const a of appts){
    const start = a.dt;
    const end = new Date(start.getTime() + (a.durationMin || 45) * 60000);

    const dtStart = formatICSDate(start);
    const dtEnd = formatICSDate(end);
    const dtStamp = formatICSDate(new Date());
    const uid = `${a.id}-${Date.now()}@mutairi-family`;

    const summary = `${a.title} — ${PATIENT_NAMES[a.patient]}`;
    const description = `الطبيب: ${a.doctor}\\nالمريض: ${a.patientName} (${a.fileNo})\\nالحضور قبل الموعد بـ 15 دقيقة\\nهاتف المواعيد: ${HOSPITAL.phone}`;
    const location = `${a.location} - ${HOSPITAL.name}`;

    lines.push(
      'BEGIN:VEVENT',
      `UID:${uid}`,
      `DTSTAMP:${dtStamp}`,
      `DTSTART:${dtStart}`,
      `DTEND:${dtEnd}`,
      `SUMMARY:${escapeICS(summary)}`,
      `DESCRIPTION:${escapeICS(description)}`,
      `LOCATION:${escapeICS(location)}`,
      // تنبيه قبل يوم
      'BEGIN:VALARM',
      'ACTION:DISPLAY',
      'TRIGGER:-P1D',
      `DESCRIPTION:تذكير: ${escapeICS(summary)} غداً`,
      'END:VALARM',
      // تنبيه قبل ساعتين
      'BEGIN:VALARM',
      'ACTION:DISPLAY',
      'TRIGGER:-PT2H',
      `DESCRIPTION:${escapeICS(summary)} خلال ساعتين`,
      'END:VALARM',
      'END:VEVENT'
    );
  }

  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}

function formatICSDate(d){
  const pad = n => n.toString().padStart(2,'0');
  return d.getUTCFullYear() +
    pad(d.getUTCMonth()+1) +
    pad(d.getUTCDate()) + 'T' +
    pad(d.getUTCHours()) +
    pad(d.getUTCMinutes()) +
    pad(d.getUTCSeconds()) + 'Z';
}

function escapeICS(s){
  return String(s).replace(/[\\,;]/g, x => '\\'+x).replace(/\n/g,'\\n');
}

function downloadICS(content, filename){
  const blob = new Blob([content], {type: 'text/calendar;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

function addOneToCalendar(id){
  const a = upcomingAppts.find(x => x.id === id);
  if(!a) return;
  const ics = generateICS([a]);
  downloadICS(ics, `موعد-${PATIENT_NAMES[a.patient]}-${a.date}.ics`);
  showToast('✓ افتح الملف لإضافته للتقويم');
}

function addAllToCalendar(){
  if(upcomingAppts.length === 0){
    showToast('لا توجد مواعيد قادمة');
    return;
  }
  const ics = generateICS(upcomingAppts);
  downloadICS(ics, `مواعيد-العائلة.ics`);
  showToast(`✓ تم تحضير ${upcomingAppts.length} موعد للتقويم`);
}

// =========================================================
// المشاركة
// =========================================================
function buildShareText(a){
  const dayName = ARABIC_DAYS[a.dt.getDay()];
  const dayNum = a.dt.getDate();
  const monthName = ARABIC_MONTHS[a.dt.getMonth()];
  return `📅 موعد ${PATIENT_NAMES[a.patient]}
${a.title}
${dayName} ${dayNum} ${monthName} · ${formatTime(a.time)}
${a.doctor}
📍 ${a.location}
🏥 ${HOSPITAL.name}`;
}

async function shareOne(id){
  const a = upcomingAppts.find(x => x.id === id);
  if(!a) return;
  const text = buildShareText(a);
  await doShare('موعد طبي', text);
}

async function shareAll(){
  if(upcomingAppts.length === 0) return;
  const lines = upcomingAppts.map(a => {
    const dayName = ARABIC_DAYS[a.dt.getDay()];
    const dayNum = a.dt.getDate();
    const monthName = ARABIC_MONTHS[a.dt.getMonth()];
    return `• ${PATIENT_NAMES[a.patient]} — ${a.title}\n  ${dayName} ${dayNum} ${monthName} · ${formatTime(a.time)} · ${a.doctor}`;
  }).join('\n\n');
  const text = `📅 مواعيد العائلة القادمة\n\n${lines}\n\n🏥 ${HOSPITAL.name}\n☎️ ${HOSPITAL.phone}`;
  await doShare('مواعيد العائلة', text);
}

async function doShare(title, text){
  if(navigator.share){
    try{
      await navigator.share({title, text});
    } catch(e){
      if(e.name !== 'AbortError') copyToClipboard(text);
    }
  } else {
    copyToClipboard(text);
  }
}

function copyToClipboard(text){
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(() => showToast('✓ تم نسخ المواعيد'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✓ تم نسخ المواعيد');
  }
}

// =========================================================
// Toast
// =========================================================
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// =========================================================
// تلميح التثبيت (للمرة الأولى فقط)
// =========================================================
function checkInstallTip(){
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches ||
                       window.navigator.standalone === true;
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const dismissed = localStorage.getItem('installTipDismissed');

  if(!isStandalone && isIOS && !dismissed){
    document.getElementById('installTip').classList.add('show');
    setTimeout(() => {
      localStorage.setItem('installTipDismissed', '1');
    }, 5000);
  }
}

init();

setInterval(renderHero, 60000);
