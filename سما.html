<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sama's Training Camp - عالم سما السحري</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for compiling JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Nunito:wght@700;900&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            direction: ltr; /* Keeping English LTR as base for the code alignment */
        }
        
        .font-arabic { font-family: 'Tajawal', sans-serif; direction: rtl; }
        .font-english { font-family: 'Nunito', sans-serif; direction: ltr; }
        .glass-panel { 
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(12px); 
            border: 2px solid rgba(255, 255, 255, 0.8); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Game Data: Intensive Training Edition for Sama ---
        const gameLevels = [
          {
            id: 1,
            title: 'Phonics Forest',
            arabicTitle: 'غابة الأصوات',
            icon: '🌲',
            theme: 'from-green-300 to-emerald-500',
            questions: [
              { text: 'Which word starts with "sh"?', options: [{ word: 'ship', emoji: '🚢', isCorrect: true }, { word: 'cheese', emoji: '🧀', isCorrect: false }] },
              { text: 'Which word starts with "ch"?', options: [{ word: 'cheese', emoji: '🧀', isCorrect: true }, { word: 'ship', emoji: '🚢', isCorrect: false }] },
              { text: 'Which word starts with "p"?', options: [{ word: 'puppet', emoji: '🧸', isCorrect: true }, { word: 'ball', emoji: '⚽', isCorrect: false }] },
              { text: 'Which word starts with "b"?', options: [{ word: 'ball', emoji: '⚽', isCorrect: true }, { word: 'puppet', emoji: '🧸', isCorrect: false }] },
              { text: 'Which word starts with "v"?', options: [{ word: 'vase', emoji: '🏺', isCorrect: true }, { word: 'face', emoji: '👧', isCorrect: false }] },
              { text: 'Which word starts with "th"?', options: [{ word: 'three', emoji: '3️⃣', isCorrect: true }, { word: 'tree', emoji: '🌳', isCorrect: false }] },
            ]
          },
          {
            id: 2,
            title: 'Alphabet Garden',
            arabicTitle: 'حديقة الحروف',
            icon: '🌸',
            theme: 'from-pink-300 to-rose-400',
            questions: [
              { text: 'Where is the small letter "a"?', options: [{ word: 'small a', emoji: 'a', isCorrect: true }, { word: 'capital A', emoji: 'A', isCorrect: false }] },
              { text: 'Match the capital letter "B"', options: [{ word: 'small d', emoji: 'd', isCorrect: false }, { word: 'small b', emoji: 'b', isCorrect: true }] },
              { text: 'Which letter is Capital?', options: [{ word: 'small e', emoji: 'e', isCorrect: false }, { word: 'capital E', emoji: 'E', isCorrect: true }] },
              { text: 'Find the small letter "m"', options: [{ word: 'small m', emoji: 'm', isCorrect: true }, { word: 'capital M', emoji: 'M', isCorrect: false }] },
              { text: 'Find the capital letter "G"', options: [{ word: 'small g', emoji: 'g', isCorrect: false }, { word: 'capital G', emoji: 'G', isCorrect: true }] },
              { text: 'Match the small letter "q"', options: [{ word: 'small p', emoji: 'p', isCorrect: false }, { word: 'small q', emoji: 'q', isCorrect: true }] },
            ]
          },
          {
            id: 3,
            title: 'Numbers Island',
            arabicTitle: 'جزيرة الأرقام',
            icon: '🏝️',
            theme: 'from-cyan-300 to-blue-500',
            questions: [
              { text: 'Find the number Ten', options: [{ word: 'Ten', emoji: '10', isCorrect: true }, { word: 'One', emoji: '1', isCorrect: false }] },
              { text: 'How many apples? 🍎🍎🍎', options: [{ word: 'Two', emoji: '2', isCorrect: false }, { word: 'Three', emoji: '3', isCorrect: true }] },
              { text: 'What comes after 4?', options: [{ word: 'Five', emoji: '5', isCorrect: true }, { word: 'Six', emoji: '6', isCorrect: false }] },
              { text: 'Find the number Seven', options: [{ word: 'Seven', emoji: '7', isCorrect: true }, { word: 'Eight', emoji: '8', isCorrect: false }] },
              { text: 'How many stars? ⭐⭐⭐⭐⭐', options: [{ word: 'Four', emoji: '4', isCorrect: false }, { word: 'Five', emoji: '5', isCorrect: true }] },
              { text: 'What is this number? 9', options: [{ word: 'Nine', emoji: '9', isCorrect: true }, { word: 'Six', emoji: '6', isCorrect: false }] },
            ]
          },
          {
            id: 4,
            title: 'Days of the Week',
            arabicTitle: 'سماء أيام الأسبوع',
            icon: '☁️',
            theme: 'from-sky-300 to-indigo-400',
            questions: [
              { text: 'The first day of the school week:', options: [{ word: 'Sunday', emoji: '☀️', isCorrect: true }, { word: 'Friday', emoji: '🕌', isCorrect: false }] },
              { text: 'What comes after Monday?', options: [{ word: 'Tuesday', emoji: '📅', isCorrect: true }, { word: 'Wednesday', emoji: '📆', isCorrect: false }] },
              { text: 'What comes after Tuesday?', options: [{ word: 'Wednesday', emoji: '🗓️', isCorrect: true }, { word: 'Thursday', emoji: '⏰', isCorrect: false }] },
              { text: 'What comes before Friday?', options: [{ word: 'Thursday', emoji: '🎒', isCorrect: true }, { word: 'Saturday', emoji: '🚲', isCorrect: false }] },
              { text: 'The weekend is on:', options: [{ word: 'Monday', emoji: '📚', isCorrect: false }, { word: 'Friday', emoji: '🎉', isCorrect: true }] },
            ]
          },
          {
            id: 5,
            title: 'Animals Park',
            arabicTitle: 'حديقة الحيوانات',
            icon: '🦒',
            theme: 'from-yellow-300 to-orange-400',
            questions: [
              { text: 'Where is the monkey?', options: [{ word: 'monkey', emoji: '🐒', isCorrect: true }, { word: 'elephant', emoji: '🐘', isCorrect: false }] },
              { text: 'Where is the tiger?', options: [{ word: 'lion', emoji: '🦁', isCorrect: false }, { word: 'tiger', emoji: '🐅', isCorrect: true }] },
              { text: 'I am a bird. I can fly!', options: [{ word: 'bird', emoji: '🐦', isCorrect: true }, { word: 'fish', emoji: '🐟', isCorrect: false }] },
              { text: 'Where is the snake?', options: [{ word: 'snake', emoji: '🐍', isCorrect: true }, { word: 'bear', emoji: '🐻', isCorrect: false }] },
              { text: 'I am a fish. I can swim!', options: [{ word: 'fish', emoji: '🐟', isCorrect: true }, { word: 'bird', emoji: '🐦', isCorrect: false }] },
              { text: 'Where is the big elephant?', options: [{ word: 'elephant', emoji: '🐘', isCorrect: true }, { word: 'monkey', emoji: '🐒', isCorrect: false }] },
            ]
          },
          {
            id: 6,
            title: 'Classroom Castle',
            arabicTitle: 'قلعة الفصل',
            icon: '🏰',
            theme: 'from-purple-400 to-fuchsia-500',
            questions: [
              { text: 'Where is the pen?', options: [{ word: 'book', emoji: '📖', isCorrect: false }, { word: 'pen', emoji: '🖊️', isCorrect: true }] },
              { text: 'They are ___ my bag.', options: [{ word: 'in', emoji: '🎒', isCorrect: true }, { word: 'under', emoji: '⬇️', isCorrect: false }] },
              { text: 'The apple is ___ my desk.', options: [{ word: 'on', emoji: '⬆️', isCorrect: true }, { word: 'in', emoji: '📦', isCorrect: false }] },
              { text: 'Where is the pencil?', options: [{ word: 'pencil', emoji: '✏️', isCorrect: true }, { word: 'pen', emoji: '🖊️', isCorrect: false }] },
              { text: 'The book is ___ the chair.', options: [{ word: 'under', emoji: '⬇️', isCorrect: true }, { word: 'on', emoji: '⬆️', isCorrect: false }] },
              { text: 'Where is the chair?', options: [{ word: 'chair', emoji: '🪑', isCorrect: true }, { word: 'desk', emoji: '🏫', isCorrect: false }] },
            ]
          }
        ];

        function App() {
          const [gameState, setGameState] = useState('start');
          const [currentLevel, setCurrentLevel] = useState(null);
          const [currentQuestionIdx, setCurrentQuestionIdx] = useState(0);
          const [score, setScore] = useState(0);
          const [showFeedback, setShowFeedback] = useState(null);

          const speak = (text) => {
            if ('speechSynthesis' in window) {
              window.speechSynthesis.cancel();
              const msg = new SpeechSynthesisUtterance(text);
              msg.lang = 'en-US';
              msg.rate = 0.85;
              msg.pitch = 1.2;
              window.speechSynthesis.speak(msg);
            }
          };

          const handleStart = () => {
            playSound('magic');
            setGameState('map');
          };

          const startLevel = (level) => {
            setCurrentLevel(level);
            setCurrentQuestionIdx(0);
            setGameState('playing');
            speak(level.title);
          };

          const handleAnswer = (option) => {
            speak(option.word);
            
            if (option.isCorrect) {
              setShowFeedback('correct');
              setScore(prev => prev + 1);
              setTimeout(() => {
                setShowFeedback(null);
                if (currentQuestionIdx < currentLevel.questions.length - 1) {
                  setCurrentQuestionIdx(prev => prev + 1);
                } else {
                  if (currentLevel.id === gameLevels.length) {
                    setGameState('win');
                  } else {
                    setGameState('map');
                  }
                }
              }, 1500);
            } else {
              setShowFeedback('wrong');
              setTimeout(() => setShowFeedback(null), 1200);
            }
          };

          const playSound = (type) => {
            try {
              const ctx = new (window.AudioContext || window.webkitAudioContext)();
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.connect(gain);
              gain.connect(ctx.destination);

              if (type === 'magic') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                osc.start();
                osc.stop(ctx.currentTime + 0.5);
              }
            } catch (e) {
              console.log('Audio not supported');
            }
          };

          const Confetti = () => {
            return (
              <div className="fixed inset-0 pointer-events-none overflow-hidden z-50">
                {[...Array(100)].map((_, i) => (
                  <div
                    key={i}
                    className="absolute animate-bounce"
                    style={{
                      left: `${Math.random() * 100}%`,
                      top: `-10%`,
                      animationDuration: `${Math.random() * 3 + 2}s`,
                      animationDelay: `${Math.random()}s`,
                      fontSize: `${Math.random() * 2 + 1}rem`
                    }}
                  >
                    {['⭐', '✨', '🌸', '👑', '🎉', '🦋', '💖'][Math.floor(Math.random() * 7)]}
                  </div>
                ))}
              </div>
            );
          };

          return (
            <div className="min-h-screen bg-gradient-to-br from-pink-200 via-purple-200 to-indigo-200 font-sans text-gray-800 flex items-center justify-center p-4 selection:bg-pink-300">
              <div className="glass-panel w-full max-w-4xl rounded-3xl p-6 md:p-8 relative overflow-hidden transition-all duration-500 border-4 border-pink-300">
                
                {gameState === 'start' && (
                  <div className="text-center space-y-8 animate-fade-in-up">
                    <div className="text-6xl md:text-8xl animate-bounce mb-4">👑👧🏻</div>
                    <h1 className="text-4xl md:text-6xl font-english font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-500">
                      Sama's Training Camp
                    </h1>
                    <h2 className="text-3xl md:text-5xl font-arabic font-black text-pink-600 mt-2 drop-shadow-sm">
                      لعبة البطلة سـمـا للتدريب المكثف
                    </h2>
                    <p className="font-arabic text-lg md:text-xl text-gray-700 mt-4 max-w-lg mx-auto font-bold bg-white bg-opacity-50 p-4 rounded-2xl">
                      أهلاً بكِ يا أميرتي سـمـا! 💖<br/>
                      هذه اللعبة صُممت خصيصاً لكِ لتكوني الأفضل في اللغة الإنجليزية. أجيبي على جميع الأسئلة لتجمعي أكبر عدد من النجوم!
                    </p>
                    <button 
                      onClick={handleStart}
                      className="mt-8 px-12 py-5 bg-gradient-to-r from-pink-400 to-purple-500 text-white font-arabic font-black text-3xl rounded-full shadow-xl hover:shadow-2xl hover:scale-110 active:scale-95 transition-all border-4 border-white"
                    >
                      ابدئي يا سما! 🚀
                    </button>
                  </div>
                )}

                {gameState === 'map' && (
                  <div className="text-center font-arabic">
                    <h2 className="text-3xl md:text-5xl font-black text-purple-700 mb-2">خريطة تحديات سـمـا</h2>
                    <p className="text-xl text-gray-700 mb-8 font-bold">اختاري عالماً يا سما لجمع المزيد من النجوم ⭐ (تحتاجين 5 نجوم لفتح العالم التالي)</p>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                      {gameLevels.map((level, idx) => {
                        const requiredScore = idx * 5;
                        const isUnlocked = idx === 0 || score >= requiredScore;
                        
                        return (
                          <button
                            key={level.id}
                            onClick={() => startLevel(level)}
                            disabled={!isUnlocked}
                            className={`relative p-6 rounded-3xl flex flex-col items-center justify-center transition-all ${
                              isUnlocked
                                ? `bg-gradient-to-br ${level.theme} text-white hover:scale-105 shadow-lg cursor-pointer border-4 border-white`
                                : 'bg-gray-200 text-gray-400 opacity-70 cursor-not-allowed border-4 border-gray-300'
                            }`}
                          >
                            <span className="text-5xl md:text-6xl mb-3 drop-shadow-md">{level.icon}</span>
                            <span className="font-english font-bold text-xl md:text-2xl drop-shadow-md">{level.title}</span>
                            <span className="font-bold text-sm md:text-lg mt-1">{level.arabicTitle}</span>
                            {!isUnlocked && (
                              <div className="absolute inset-0 bg-white bg-opacity-50 rounded-3xl flex items-center justify-center backdrop-blur-[2px]">
                                <span className="text-5xl drop-shadow-md">🔒</span>
                              </div>
                            )}
                          </button>
                        );
                      })}
                    </div>
                    
                    <div className="mt-8 flex justify-center items-center gap-2 text-3xl font-black text-yellow-600 bg-yellow-100 py-4 px-10 rounded-full inline-flex mx-auto border-4 border-yellow-300 shadow-lg">
                      <span>نجوم سـمـا:</span>
                      <span>{score} ⭐</span>
                    </div>
                  </div>
                )}

                {gameState === 'playing' && currentLevel && (
                  <div className="text-center max-w-4xl mx-auto">
                    <div className="flex justify-between items-center mb-6">
                      <button 
                        onClick={() => setGameState('map')}
                        className="text-gray-600 hover:text-purple-600 font-arabic font-bold bg-white px-5 py-2 rounded-full shadow-sm hover:shadow-md transition-all border-2 border-gray-200"
                      >
                        ← عودة للخريطة
                      </button>
                      <div className="hidden md:flex items-center gap-2 bg-white px-6 py-2 rounded-full shadow-sm">
                        <span className="font-arabic font-bold text-pink-500">سـمـا تلعب:</span>
                        <span className="font-english font-bold text-purple-700">{currentLevel.title} {currentLevel.icon}</span>
                      </div>
                      <div className="font-arabic font-black text-yellow-600 text-xl md:text-2xl bg-yellow-50 px-5 py-2 rounded-full border-2 border-yellow-300 shadow-sm">
                        نجوم سما: {score} ⭐
                      </div>
                    </div>

                    <div className="bg-white rounded-3xl p-6 md:p-10 shadow-xl relative border-4 border-purple-100">
                      <div 
                        className="flex flex-col items-center justify-center cursor-pointer mb-8 group"
                        onClick={() => speak(currentLevel.questions[currentQuestionIdx].text)}
                      >
                        <div className="bg-gradient-to-r from-blue-400 to-indigo-500 text-white p-4 rounded-full mb-4 group-hover:scale-110 transition-all shadow-md">
                          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                        </div>
                        <h3 className="font-english font-black text-3xl md:text-5xl text-gray-800 drop-shadow-sm text-center leading-tight">
                          {currentLevel.questions[currentQuestionIdx].text}
                        </h3>
                        <p className="font-arabic text-gray-500 mt-4 text-sm md:text-base font-bold bg-gray-100 px-6 py-2 rounded-full animate-pulse">
                          (اضغطي هنا لتستمعي للسؤال يا سما)
                        </p>
                      </div>

                      <div className="grid grid-cols-2 gap-4 md:gap-8">
                        {currentLevel.questions[currentQuestionIdx].options.map((option, idx) => (
                          <button
                            key={idx}
                            onClick={() => handleAnswer(option)}
                            disabled={showFeedback !== null}
                            className="flex flex-col items-center justify-center p-6 md:p-12 bg-gradient-to-b from-gray-50 to-gray-100 border-4 border-gray-200 hover:border-pink-400 rounded-3xl shadow-md hover:shadow-2xl transition-all hover:-translate-y-2"
                          >
                            <span className="text-7xl md:text-9xl mb-4 drop-shadow-lg font-english font-black text-purple-600">{option.emoji}</span>
                            <span className="font-english font-black text-2xl md:text-4xl text-gray-800">{option.word}</span>
                          </button>
                        ))}
                      </div>

                      {showFeedback === 'correct' && (
                        <div className="absolute inset-0 bg-green-500 bg-opacity-95 rounded-3xl flex flex-col items-center justify-center text-white z-10 animate-bounce">
                          <span className="text-9xl mb-6 drop-shadow-xl">👑</span>
                          <h2 className="font-arabic font-black text-6xl drop-shadow-md">أحسنتِ يا سـمـا!</h2>
                          <p className="font-arabic text-2xl mt-4 font-bold">إجابة عبقرية 🌟</p>
                        </div>
                      )}
                      {showFeedback === 'wrong' && (
                        <div className="absolute inset-0 bg-rose-500 bg-opacity-95 rounded-3xl flex flex-col items-center justify-center text-white z-10">
                          <span className="text-9xl mb-6 font-english font-black drop-shadow-xl">👀</span>
                          <h2 className="font-arabic font-black text-5xl drop-shadow-md">لا بأس يا سـمـا!</h2>
                          <p className="font-arabic text-2xl mt-4 font-bold">أنتِ ذكية، حاولي مرة أخرى 💪</p>
                        </div>
                      )}
                    </div>

                    <div className="mt-8 flex justify-center gap-3 bg-white bg-opacity-50 py-3 px-6 rounded-full inline-flex">
                      {currentLevel.questions.map((_, idx) => (
                        <div 
                          key={idx} 
                          className={`h-4 rounded-full transition-all duration-500 shadow-inner ${idx === currentQuestionIdx ? 'w-12 bg-pink-500' : idx < currentQuestionIdx ? 'w-4 bg-green-400' : 'w-4 bg-gray-300'}`}
                        />
                      ))}
                    </div>
                  </div>
                )}

                {gameState === 'win' && (
                  <div className="text-center py-12 z-10 relative animate-fade-in-up">
                    <Confetti />
                    <div className="text-9xl mb-8 drop-shadow-xl animate-bounce">🏆👧🏻💖</div>
                    <h1 className="text-6xl md:text-8xl font-english font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 mb-6 drop-shadow-md">
                      SAMA IS THE BEST!
                    </h1>
                    <h2 className="text-4xl md:text-6xl font-arabic font-black text-pink-600 mb-8 drop-shadow-sm">
                      أنتِ الأولى يا سـمـا!
                    </h2>
                    <div className="bg-white bg-opacity-80 p-8 rounded-3xl max-w-3xl mx-auto shadow-xl border-4 border-pink-200">
                      <p className="font-arabic text-2xl md:text-3xl text-gray-800 mb-6 font-bold leading-relaxed">
                        لقد أكملتِ التدريب المكثف ببراعة فائقة!
                      </p>
                      <div className="text-4xl font-arabic font-black text-yellow-600 mb-6">
                        رصيدك النهائي: {score} نجمة ذهبية ⭐
                      </div>
                      <p className="font-arabic text-xl text-gray-600 font-bold">
                        (معلمتك وكل صديقاتك فخورون جداً بالبطلة سما!)
                      </p>
                    </div>
                    <button 
                      onClick={() => {
                        setGameState('start');
                        setScore(0);
                      }}
                      className="mt-10 px-12 py-5 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-arabic font-black text-3xl rounded-full shadow-2xl hover:scale-110 active:scale-95 transition-all border-4 border-white"
                    >
                      العبِ من جديد يا بطلة 🔄
                    </button>
                  </div>
                )}

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
