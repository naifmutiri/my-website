<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الأبطال</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            /* خلفية بتدرج لوني فضائي ممتع */
            background: linear-gradient(135deg, #1a0b2e 0%, #4b1d52 100%);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* تأثير النجوم العائمة في الخلفية */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.4;
            z-index: -1;
            animation: moveStars 50s linear infinite;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .header {
            text-align: center;
            padding: 40px 20px 20px;
            animation: floatUpDown 3s ease-in-out infinite;
        }

        /* عنوان رئيسي براق ومرح */
        .header h1 {
            font-size: 38px;
            margin: 0;
            color: #ffde00;
            text-shadow: 0 0 15px rgba(255, 222, 0, 0.6), 0 0 30px rgba(255, 222, 0, 0.4);
            letter-spacing: 1px;
        }

        .header p {
            font-size: 20px;
            color: #00e5ff;
            margin-top: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* حاوية النموذج مع إطار نيون دائري */
        .form-container {
            width: 95%;
            max-width: 850px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            border: 5px solid #00e5ff;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.5), inset 0 0 15px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        /* شريط زخرفي علوي للنموذج */
        .form-top-bar {
            background: #00e5ff;
            color: #1a0b2e;
            text-align: center;
            padding: 10px;
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 1px;
        }

        iframe {
            width: 100%;
            height: 700px;
            border: none;
            display: block;
        }

        /* تأثير الحركة للعنوان */
        @keyframes floatUpDown {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }

        .footer {
            margin-top: auto;
            padding: 20px;
            font-size: 16px;
            color: #ffde00;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="header">
        <h1>🚀 جاهزون لمهمة الارتقاء؟ 🌟</h1>
        <p>يا أبطال الجبيلة، حان وقت التحدي لإثبات مهاراتكم! 🎮</p>
    </div>

    <div class="form-container">
        <div class="form-top-bar">
            🎯 ركز جيداً.. وانطلق نحو القمة!
        </div>
        <iframe src="https://forms.office.com/pages/responsepage.aspx?id=0gr9a2BA-U-RAIEOdddRtYQ0RnDu8b9Es8ORQyKWVGpUQkJPQzZPOTZFMlZWMlRRWUtYRTQ0SlhROC4u&embed=true" allowfullscreen></iframe>
    </div>

    <div class="footer">
        ✨ بالتوفيق لجميع الأبطال المشاركين ✨
    </div>

</body>
</html>
